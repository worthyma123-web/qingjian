<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我们结婚啦</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#fdf6f6;padding:0 0 40px;}
.wrap{max-width:500px;margin:0 auto;background:#fff;padding:40px 20px;}
.title{text-align:center;font-size:32px;color:#d81b60;margin:20px 0;}
.name{text-align:center;font-size:24px;color:#9c5454;margin-bottom:30px;}
.photo img{width:100%;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px #0001;}
.count{display:flex;justify-content:center;gap:12px;margin:40px 0;}
.time{width:60px;height:60px;background:#d81b60;color:white;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.time .num{font-size:20px;font-weight:bold;}
.info{text-align:center;margin:30px 0;line-height:1.8;font-size:16px;color:#555;}
</style>
</head>

<body>
<div class="wrap">
  <div class="title">💍 我们结婚啦</div>
  <div class="name">麻意浩 & 张小艺</div>

  <!-- 照片：你直接在 GitHub 传 photo1~10.jpg 就能显示 -->
  <div class="photo">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
    <img src="photo6.jpg">
    <img src="photo7.jpg">
    <img src="photo8.jpg">
    <img src="photo9.jpg">
    <img src="photo10.jpg">
  </div>

  <div class="count">
    <div class="time"><span class="num" id="d">00</span><span>天</span></div>
    <div class="time"><span class="num" id="h">00</span><span>时</span></div>
    <div class="time"><span class="num" id="m">00</span><span>分</span></div>
    <div class="time"><span class="num" id="s">00</span><span>秒</span></div>
  </div>

  <div class="info">
    婚礼时间：2026年05月02日<br>
    地点：洛阳市 · 好合喜宴
  </div>
</div>

<script>
// 固定倒计时：2026年5月2日 00:00
function count() {
  var end = new Date('2026-05-02 00:00:00');
  var now = new Date();
  var diff = end - now;

  var d = Math.floor(diff / 86400000);
  var h = Math.floor((diff % 86400000) / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  var s = Math.floor((diff % 60000) / 1000);

  d = d < 0 ? 0 : d;
  h = h < 0 ? 0 : h;
  m = m < 0 ? 0 : m;
  s = s < 0 ? 0 : s;

  document.getElementById('d').innerText = String(d).padStart(2, '0');
  document.getElementById('h').innerText = String(h).padStart(2, '0');
  document.getElementById('m').innerText = String(m).padStart(2, '0');
  document.getElementById('s').innerText = String(s).padStart(2, '0');
}
setInterval(count, 1000);
count();
</script>
</body>
</html>
